defaults:
  - data: guyot_smoke
  - augmentation: disabled
  - model: treeformer_2d
  - checkpoint: default
  - train: default
  - optimizer: adamw_step
  - logging: tensorboard
  - ema: disabled
  - distributed: single
  - _self_

legacy_config_path: null
runtime:
  device: cuda
  output_dir: ${TRAIN.SAVE_PATH}/runs/${log.exp_name}_${DATA.SEED}
  fail_if_cuda_unavailable: true
  deterministic: false
  parameter_report_name: parameter_report.json
  cuda:
    allow_tf32: true
    cudnn_benchmark: true
    float32_matmul_precision: high
  compile:
    aux_head: false
    aux_loss: false
    mode: reduce-overhead
    fullgraph: true
    dynamic: false
    backend: null
  amp:
    enabled: false
    dtype: float16

hydra:
  job:
    chdir: false
  run:
    dir: ${runtime.output_dir}/hydra/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ${TRAIN.SAVE_PATH}/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra.job.num}
