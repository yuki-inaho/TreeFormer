# @package _global_
DATA:
  LEGACY_ROTATE: false
  AUGMENTATION:
    enabled: true
    seed: ${DATA.SEED}
    photometric:
      enabled: true
      backend: opencv
      allow_fallback: true
      p: 0.80
      brightness_contrast_p: 0.30
      hsv_p: 0.20
      gamma_p: 0.20
      noise_p: 0.10
      blur_p: 0.05
    affine:
      enabled: false
    elastic:
      enabled: false
