# @package _global_
#
# Full-resolution joint dense-supervision profile for 800x600 RGB inputs.
# This retains the node-center / offset / ranking objective while also
# optimizing external-mask segmentation and mask-skeleton PAF targets.
# The explicit DATA values prevent this profile from falling back to the
# legacy 128px/half-resolution smoke contract.
DATA:
  MAX_SIZE: 640
  SEG_RESIZE_POLICY: full
  AUX_HEATMAP_SIGMA: 1.0
  AUX_HEATMAP_TARGET_STRIDE: 4

TRAIN:
  W_AUX_SEG: 1.0
  W_AUX_DETAIL: 0.0
  W_AUX_HEATMAP: 1.0
  W_AUX_HEATMAP_MSE: 0.0
  W_AUX_HEATMAP_FOCAL: 1.0
  AUX_HEATMAP_FOCAL_ALPHA: 2.0
  AUX_HEATMAP_FOCAL_BETA: 4.0
  AUX_HEATMAP_FOCAL_POS_SOURCE: node_centers
  W_AUX_HEATMAP_RIDGE: 0.0
  W_AUX_HEATMAP_COORD: 0.0
  W_AUX_HEATMAP_COORD_VAR: 0.0
  W_AUX_HEATMAP_PEAK: 0.0
  W_AUX_HEATMAP_OFFSET: 1.0
  AUX_HEATMAP_OFFSET_HUBER_DELTA: 0.25
  W_AUX_HEATMAP_RANK: 0.25
  AUX_HEATMAP_RANK_EXCLUSION_RADIUS: 1.5
  AUX_HEATMAP_RANK_MARGIN: 1.0
  AUX_HEATMAP_RANK_DISTANCE_MARGIN: 0.25
  AUX_HEATMAP_RANK_TEMPERATURE: 1.0
  AUX_HEATMAP_RANK_TOPK: 64
  AUX_HEATMAP_MASK_SOURCE: segmentation
  AUX_HEATMAP_MASK_OUTSIDE_WEIGHT: 0.05
  W_AUX_PAF: 0.25
  AUX_HEATMAP_EVAL_PEAK_THRESHOLD: 0.25
  AUX_HEATMAP_EVAL_MATCH_RADIUS: 1.5

  # Full resolution must be recorded in the run itself; checkpoint selection
  # occurs only at the requested validation cadence.
  VAL_INTERVAL: 10

MODEL:
  AUX_HEAD:
    DECODER_STRIDE: 4
    GRAPH_CONDITIONING: none

log:
  exp_name: heatmap_center_offset_rank_joint_fullres
  message: "640x480 full-resolution joint segmentation, node-center heatmap, offset, ranking, and PAF training"
