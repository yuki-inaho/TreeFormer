# @package _global_
TRAIN:
  # Keep a small pixelwise anchor while adding point-focused objectives.
  W_AUX_HEATMAP: 1.0
  W_AUX_HEATMAP_MSE: 0.25
  W_AUX_HEATMAP_FOCAL: 1.0
  AUX_HEATMAP_FOCAL_ALPHA: 2.0
  AUX_HEATMAP_FOCAL_BETA: 4.0
  AUX_HEATMAP_FOCAL_POS_THRESHOLD: 0.99
  AUX_HEATMAP_FOCAL_POS_SOURCE: target_peaks
  W_AUX_HEATMAP_RIDGE: 0.05
  AUX_HEATMAP_RIDGE_THRESHOLD: 0.05
  W_AUX_HEATMAP_COORD: 0.05
  AUX_HEATMAP_COORD_WINDOW_RADIUS: 6
  AUX_HEATMAP_COORD_TEMPERATURE: 1.0
  AUX_HEATMAP_COORD_HUBER_DELTA: 1.0
  W_AUX_HEATMAP_COORD_VAR: 0.001
  W_AUX_HEATMAP_PEAK: 0.05
  AUX_HEATMAP_PEAK_CENTER_RADIUS: 1
  AUX_HEATMAP_PEAK_ANNULUS_INNER: 3
  AUX_HEATMAP_PEAK_ANNULUS_OUTER: 6
  AUX_HEATMAP_PEAK_MARGIN: 1.0
  AUX_HEATMAP_PEAK_TEMPERATURE: 1.0
  AUX_HEATMAP_PEAK_MIN_TARGET: 0.5
  AUX_HEATMAP_EVAL_PEAK_THRESHOLD: 0.25
  AUX_HEATMAP_EVAL_MATCH_RADIUS: 6.0
DATA:
  AUX_HEATMAP_SIGMA: 3.0
log:
  exp_name: ${oc.env:TREEFORMER_EXP_NAME,ablate_heatmap_peak_focused}
  message: "Heatmap ablation: focal, local soft-argmax, variance and peakness with a small MSE anchor"
