# @package _global_
TRAIN:
  MODE: aux_supervised
  SKIP_GRAPH_OUTPUT: true
  EPOCHS: 1
  LR: 1e-4
  LR_BACKBONE: 3e-5
  WEIGHT_DECAY: 1e-4
  LR_DROP: 100
  CLIP_MAX_NORM: 20.0
  SAVE_PATH: ${oc.env:TREEFORMER_TRAIN_OUTPUT,${oc.env:TREEFORMER_ASSETS_ROOT,../TreeFormer_assets}/trained_weights_hydra_aux}
  VAL_INTERVAL: 1
  SAVE_VAL: false
  LOSSES: []
  W_BBOX: 0.0
  W_CLASS: 0.0
  W_CARD: 0.0
  W_NODE: 0.0
  W_EDGE: 0.0
  W_AUX_SEG: 1.0
  W_AUX_HEATMAP: 1.0
  W_AUX_PAF: 0.25
MODEL:
  GRAPH_OUTPUT_ENABLED: false
  AUX_HEAD:
    ENABLED: true
    HIDDEN_DIM: 128
    OUT_CHANNELS: 4
checkpoint:
  metric_name: val/aux_total_loss
  mode: min
  pretrained_strict: false
log:
  exp_name: hydra_aux_supervised_smoke
  message: Hydra-managed TreeFormer aux supervised map training
