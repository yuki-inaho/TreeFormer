# @package _global_
TRAIN:
  MODE: aux_supervised
  SKIP_GRAPH_OUTPUT: true
  EPOCHS: 1
  LR: 1e-4
  LR_BACKBONE: 3e-5
  WEIGHT_DECAY: 1e-4
  LR_DROP: 100
  CLIP_MAX_NORM: 20.0
  SAVE_PATH: ${oc.env:TREEFORMER_TRAIN_OUTPUT,${oc.env:TREEFORMER_ASSETS_ROOT,../TreeFormer_assets}/trained_weights_hydra_seg_heatmap_paf}
  VAL_INTERVAL: ${oc.env:TREEFORMER_VAL_INTERVAL,1}
  SAVE_VAL: false
  LOSSES: []
  W_BBOX: 0.0
  W_CLASS: 0.0
  W_CARD: 0.0
  W_NODE: 0.0
  W_EDGE: 0.0
  W_AUX_SEG: 1.0
  W_AUX_SEG_BCE: 1.0
  W_AUX_SEG_DICE: 2.0
  W_AUX_SEG_FOCAL: 0.0
  AUX_SEG_POS_WEIGHT: auto
  AUX_SEG_POS_WEIGHT_MAX: 4.0
  AUX_SEG_FOCAL_ALPHA: 0.75
  AUX_SEG_FOCAL_GAMMA: 2.0
  AUX_SEG_THRESHOLD: 0.5
  W_AUX_DETAIL: 0.0
  W_AUX_DETAIL_BCE: 1.0
  W_AUX_DETAIL_DICE: 1.0
  AUX_DETAIL_THRESHOLD: 0.1
  AUX_DETAIL_SCALES: [1, 2, 4]
  AUX_DETAIL_SUPPORT_KERNEL_SIZE: 3
  AUX_DETAIL_EVAL_THRESHOLD: 0.5
  W_AUX_HEATMAP: 1.0
  W_AUX_HEATMAP_MSE: 1.0
  W_AUX_HEATMAP_FOCAL: 0.0
  AUX_HEATMAP_FOCAL_ALPHA: 2.0
  AUX_HEATMAP_FOCAL_BETA: 4.0
  AUX_HEATMAP_FOCAL_POS_THRESHOLD: 0.99
  AUX_HEATMAP_FOCAL_POS_SOURCE: threshold
  W_AUX_HEATMAP_RIDGE: 0.0
  AUX_HEATMAP_RIDGE_THRESHOLD: 0.05
  AUX_HEATMAP_MASK_SOURCE: segmentation
  AUX_HEATMAP_MASK_OUTSIDE_WEIGHT: 0.0
  W_AUX_HEATMAP_COORD: 0.0
  AUX_HEATMAP_COORD_WINDOW_RADIUS: 6
  AUX_HEATMAP_COORD_TEMPERATURE: 1.0
  AUX_HEATMAP_COORD_HUBER_DELTA: 1.0
  W_AUX_HEATMAP_COORD_VAR: 0.0
  W_AUX_HEATMAP_PEAK: 0.0
  AUX_HEATMAP_PEAK_CENTER_RADIUS: 1
  AUX_HEATMAP_PEAK_ANNULUS_INNER: 3
  AUX_HEATMAP_PEAK_ANNULUS_OUTER: 6
  AUX_HEATMAP_PEAK_MARGIN: 1.0
  AUX_HEATMAP_PEAK_TEMPERATURE: 1.0
  AUX_HEATMAP_PEAK_MIN_TARGET: 0.5
  AUX_HEATMAP_EVAL_PEAK_THRESHOLD: 0.5
  AUX_HEATMAP_EVAL_MATCH_RADIUS: 6.0
  W_AUX_PAF: 0.25
  W_AUX_PAF_L1: 1.0
  W_AUX_PAF_ANGULAR: 0.25
  AUX_PAF_MASK_SOURCE: paf_and_segmentation
  AUX_DIRECTION_ENCODING: double_angle
DATA:
  SEGMENTATION_TARGET_SOURCE: external_mask
  LEGACY_ROTATE: false
  FAST_SEGMENTATION_LOADER: true
  SEG_CACHE_MODE: none
  SEG_RESIZE_POLICY: legacy_half
  AUX_TARGET_MODE: seg_heatmap_paf
  AUX_HEATMAP_SIGMA: 3.0
  AUX_HEATMAP_CUTOFF: 0.01
  AUX_HEATMAP_TARGET_STRIDE: 1
  # Learn local orientation over the external-mask foreground, excluding
  # ambiguous junctions, rather than a thin graph-derived line.
  AUX_DIRECTION_TARGET_SOURCE: mask_skeleton
  AUX_DIRECTION_ENCODING: double_angle
  AUX_DIRECTION_TANGENT_RADIUS: 8
  AUX_DIRECTION_JUNCTION_EXCLUSION_RADIUS: 6
  AUX_PAF_LINE_THICKNESS: 2  # Legacy graph_edges fallback only.
  AUX_PAF_MASK_THICKNESS: 6  # Legacy graph_edges fallback only.
MODEL:
  GRAPH_OUTPUT_ENABLED: false
  AUX_HEAD:
    ENABLED: true
    HIDDEN_DIM: 128
    OUT_CHANNELS: 5
checkpoint:
  metric_name: val/aux_total_loss
  mode: min
  pretrained_strict: false
log:
  exp_name: hydra_seg_heatmap_paf_smoke
  message: Hydra-managed TreeFormer segmentation, node heatmap and edge-direction supervised training
