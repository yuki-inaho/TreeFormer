DATA:
  DIM: 2
  BATCH_SIZE: 1
  MAX_SIZE: 512
  DATA_PATH: ../TreeFormer_assets/datasets/3D2cut_Single_Guyot_extracted
  TRAIN_PATH: ../TreeFormer_assets/datasets/3D2cut_Single_Guyot_extracted
  VAL_PATH: ../TreeFormer_assets/datasets/3D2cut_Single_Guyot_extracted
  TEST_PATH: ../TreeFormer_assets/datasets/3D2cut_Single_Guyot_extracted
  DATASET: guyot-2D
  IMG_SIZE: [512, 512]
  NUM_WORKERS: 0
  SEED: 3407

MODEL:
  NUM_CLASSES: 2

  ENCODER:
    TYPE: deformable_transformer_backbone
    NAME: deformable_transformer_backbone
    HIDDEN_DIM: 128
    POSITION_EMBEDDING: sine
    LR_BACKBONE: 2e-5
    NUM_FEATURE_LEVELS: 4
    BACKBONE: resnet50
    MASKS: False
    DILATION: False
    IN_CHANS: 3
    DEPTHS: [4, 4, 8, 8]

  DECODER:
    TYPE: deformable_transformer
    NAME: deformable_transformer
    HIDDEN_DIM: 128
    NHEADS: 8
    ENC_LAYERS: 4
    DEC_LAYERS: 4
    DIM_FEEDFORWARD: 128
    DROPOUT: 0.15
    ACTIVATION: relu
    NUM_FEATURE_LEVELS: 4
    DEC_N_POINTS: 4
    ENC_N_POINTS: 4
    TWO_STAGE: False
    AUX_LOSS: False
    WITH_BOX_REFINE: False
    OBJ_TOKEN: 64
    RLN_TOKEN: 1
    DUMMY_TOKEN: 0
    RLN_ATTN: True

  MATCHER:
    C_CLASS: 3
    C_NODE: 5

TRAIN:
  EPOCHS: 0
  LR: 1e-4
  LR_BACKBONE: 3e-5
  WEIGHT_DECAY: 1e-4
  LR_DROP: 100
  CLIP_MAX_NORM: 0.1
  SAVE_PATH: ./trained_weights/
  VAL_INTERVAL: 1
  SAVE_VAL: False
  LOSSES: ["boxes", "class", "cards", "nodes", "edges"]
  W_BBOX: 2.0
  W_CLASS: 3.0
  W_CARD: 1.0
  W_NODE: 5.0
  W_EDGE: 4.0

log:
  exp_name: guyot_dry_run
  message: "Guyot dry-run config using repo-external extracted dataset"
