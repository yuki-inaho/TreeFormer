DATA:
  DIM: 2
  BATCH_SIZE: 1
  MAX_SIZE: 256
  DATA_PATH: /home/kasm-user/Desktop/TreeFormer_assets/datasets/3D2cut_Single_Guyot_extracted
  DATASET: guyot-2D
  TRAIN_SPLIT: train
  VAL_SPLIT: test
  TRAIN_LIMIT: 1
  VAL_LIMIT: 1
  IMG_SIZE: [256, 256]
  NUM_WORKERS: 0
  SEED: 3407

MODEL:
  NUM_CLASSES: 2

  ENCODER:
    TYPE: deformable_transformer_backbone
    NAME: deformable_transformer_backbone
    HIDDEN_DIM: 128
    POSITION_EMBEDDING: sine
    LR_BACKBONE: 2e-5
