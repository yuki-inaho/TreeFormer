    NAME: deformable_transformer
    HIDDEN_DIM: 128
    NHEADS: 8
    ENC_LAYERS: 4
    DEC_LAYERS: 4
    DIM_FEEDFORWARD: 128
    DROPOUT: 0.15
    ACTIVATION: relu
    NUM_FEATURE_LEVELS: 4
    DEC_N_POINTS: 4
    ENC_N_POINTS: 4
    TWO_STAGE: False
    AUX_LOSS: False
    WITH_BOX_REFINE: False
    OBJ_TOKEN: 256
    RLN_TOKEN: 1
    DUMMY_TOKEN: 0
    RLN_ATTN: True

  MATCHER:
    C_CLASS: 3
    C_NODE: 5

TRAIN:
  EPOCHS: 1
  LR: 1e-4
  LR_BACKBONE: 3e-5
  WEIGHT_DECAY: 1e-4
  LR_DROP: 100
  CLIP_MAX_NORM: 0.1
  SAVE_PATH: /home/kasm-user/Desktop/TreeFormer_assets/trained_weights_smoke
  VAL_INTERVAL: 1
  SAVE_VAL: False
  LOSSES: ["boxes", "class", "cards", "nodes", "edges"]
  W_BBOX: 2.0
  W_CLASS: 3.0
  W_CARD: 1.0
  W_NODE: 5.0
  W_EDGE: 4.0

log:
